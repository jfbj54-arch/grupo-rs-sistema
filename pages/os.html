<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordens de Serviço - Grupo RS Prestadora</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="protegerPagina(); carregarOS(); carregarClientes(); carregarServicos();">

    <div class="topbar">
        <h2>Ordens de Serviço</h2>
        <button class="logout" onclick="logout()">Sair</button>
    </div>

    <div class="form-container">
        <h3>Nova Ordem de Serviço</h3>

        <select id="cliente">
            <option value="">Selecione o Cliente</option>
        </select>

        <select id="servico">
            <option value="">Selecione o Serviço</option>
        </select>

        <input type="date" id="data">
        <input type="text" id="observacao" placeholder="Observações">

        <button onclick="salvarOS()">Salvar</button>
    </div>

    <table class="tabela">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Serviço</th>
                <th>Data</th>
                <th>Observação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaOS"></tbody>
    </table>

    <script src="../js/firebase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/os.js"></script>

</body>
</html>
